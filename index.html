<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>outisislost</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      font-size: 18px;
      color: #b3b3b3;
      line-height: 1.6;
    }

    .links {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a {
      text-decoration: none;
      color: #000;
      background: #ffffff;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.2s;
    }

    a:hover {
      transform: scale(1.03);
      background: #eaeaea;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

    <h1>outisislost</h1>

    <p>
      A personal brand exploring ideas, creativity, and everything in between.
      <br />
      Lost is just another word for searching.
    </p>

    <div class="links">
      <a href="https://instagram.com/outisislost" target="_blank">Instagram</a>
      <a href="https://x.com/outisislost" target="_blank">X (Twitter)</a>
      <a href="https://tiktok.com/@outisislost" target="_blank">TikTok</a>
